{id:177,c:'auth',t:'true_false',q:'Wenn eine Plattform Nähe ökonomisch verwertet, ist Intimität nicht mehr nur privat, sondern auch infrastrukturell organisiert.',o:['Stimmt','Stimmt nicht'],a:0,e:'Plattformen transformieren Intimität: Was sich wie private Verbindung anfühlt, wird als Engagement-Daten extrahiert, als Zielgruppenprofile vermarktet und durch Design gesteuert.',h:1},
{id:178,c:'auth',t:'multiple_choice',q:'Welche Aussage ist am präzisesten?',o:['Authentizität und Strategie schließen sich auf Plattformen klar aus','Plattformen belohnen häufig Formen strategisch kuratierter Authentizität','Authentizität spielt für Plattformen keine Rolle','Je echter ein Inhalt, desto sichtbarer wird er automatisch'],a:1,e:'Strategische Verletzlichkeit und inszenierte Alltäglichkeit sind selbst Formen von Authentizitätskuration. Plattformen haben Authentizität zu einem Produktionsstil gemacht.',h:1},
{id:179,c:'auth',t:'true_false',q:'Dating-Apps können Menschen in kommensurable, vergleichbare Profile übersetzen.',o:['Stimmt','Stimmt nicht'],a:0,e:'Profilisierung macht vergleichbar, was eigentlich inkommensurabel ist. Die Reduktion komplexer sozialer Personen auf Profile ist eine folgenreiche Infrastrukturentscheidung.',h:1},
{id:180,c:'auth',t:'multiple_choice',q:'Was ist an dieser Logik ethisch besonders interessant?',o:['Sie spart Papier','Sie verwandelt komplexe soziale Personen in vergleichbare Auswahlobjekte','Sie beendet Unsicherheit vollständig','Sie macht alle Beziehungen gleich intensiv'],a:1,e:'Die Ökonomisierung des Begehrens durch Profillogiken verändert, wie Nähe, Zugehörigkeit und Beziehung wahrgenommen und erfahren werden.',h:1},
{id:181,c:'auth',t:'true_false',q:'Virtuelle Influencer sind ethisch nur deshalb relevant, weil sie „nicht echt“ sind.',o:['Stimmt','Stimmt nicht'],a:1,e:'Virtuelle Influencer werfen tiefergehende Fragen auf: Welche Normen für Körper, Authentizität und parasoziale Bindung werden strukturell reproduziert?',h:1},
{id:182,c:'auth',t:'multiple_choice',q:'Welche tiefergehende Frage ist bei virtuellen Influencern zentral?',o:['Sind sie groß genug?','Welche Form von Authentizität, Kontrolle und Bindung wird hier normalisiert?','Welche Farbe hat ihr Profilbild?','Wie oft posten sie täglich?'],a:1,e:'Virtuelle Influencer normalisieren Körperideale, Verfügbarkeitserwartungen und Bindungsformen — die strukturellen Effekte sind relevanter als die Frage ihrer Echtheit.',h:1},
{id:183,c:'auth',t:'true_false',q:'Ein AI-Companion kann subjektiv Trost spenden, ohne dass daraus automatisch folgt, dass die Beziehung symmetrisch oder unproblematisch ist.',o:['Stimmt','Stimmt nicht'],a:0,e:'Subjektive Erfahrung und ethische Beurteilung sind zu trennen: Eine Beziehung kann tief empfunden werden und trotzdem asymmetrisch und kommerziell extraktiv wirken.',h:1},
{id:184,c:'auth',t:'multiple_choice',q:'Was ist die stärkste ethische Zuspitzung bei AI-Companions?',o:['Sie schreiben zu schnell','Sie kombinieren Verfügbarkeit, Personalisierung und radikale Asymmetrie','Sie sind zu bunt','Sie ersetzen jedes Gespräch automatisch'],a:1,e:'Die Kombination aus 24/7-Verfügbarkeit, tiefpersonalisierter Reaktion und radikaler Asymmetrie schafft Bindungsstrukturen, die kommerziell ausgebeutet werden können.',h:1},
{id:185,c:'auth',t:'true_false',q:'Wenn Plattformen Schönheitsnormen technisch verstärken, betrifft das nicht nur Inhalte, sondern auch Selbstwert und Vergleichslogiken.',o:['Stimmt','Stimmt nicht'],a:0,e:'Sichtbarkeitsalgorithmen, die bestimmte Körperbilder bevorzugen, und Filter, die Aussehen standardisieren, stabilisieren normative Standards und beeinflussen Vergleichsdynamiken.',h:1},
{id:186,c:'auth',t:'multiple_choice',q:'Welche Aussage ist am treffendsten?',o:['Plattformen zeigen Schönheitsideale nur passiv','Plattformen können normative Standards technisch stabilisieren','Likes spielen für Selbstvergleich keine Rolle','Filter verändern nur Farben, nicht Normen'],a:1,e:'Durch Empfehlungsalgorithmen, Filtertools und Engagement-Metriken werden bestimmte Normalitätsvorstellungen aktiv produziert und zirkuliert — nicht nur passiv gezeigt.',h:1},
{id:187,c:'auth',t:'true_false',q:'Online Hate lässt sich im Kursverständnis sinnvoll als Architekturfrage beschreiben.',o:['Stimmt','Stimmt nicht'],a:0,e:'Architekturentscheidungen — Anonymität, Geschwindigkeit, Verbreitung von Empörung, fehlende Konsequenzen — strukturieren toxisches Verhalten mit. Design ist nicht neutral.',h:1},
{id:188,c:'auth',t:'multiple_choice',q:'Warum ist die Architekturperspektive bei Online Hate stark?',o:['Weil Moral bedeutungslos ist','Weil Design, Sichtbarkeit und Moderation beeinflussen, was verstärkt oder unterbrochen wird','Weil Plattformen keine Verantwortung tragen','Weil nur Gesetze zählen'],a:1,e:'Architektur erklärt, warum problematisches Verhalten in bestimmten Systemen häufiger vorkommt — und damit, wo Interventionen wirksam ansetzen können.',h:1},
{id:189,c:'auth',t:'true_false',q:'Die tiefste Macht digitaler Systeme kann in Normalisierung statt in offenem Zwang liegen.',o:['Stimmt','Stimmt nicht'],a:0,e:'Systeme, die bestimmte Verhaltensweisen oder Lebensentwürfe unsichtbar machen oder sichtbar, üben Macht durch Normalisierung aus — ohne expliziten Zwang.',h:1},
{id:190,c:'auth',t:'multiple_choice',q:'Welche Aussage fasst den schwierigsten Gedankenschritt von Session 6 am besten zusammen?',o:['Plattformen beeinflussen nur Konsumentscheidungen','Plattformen formen auch, was als normal, attraktiv, intim oder glaubwürdig gilt','Plattformen sind nur technische Werkzeuge','Plattformen betreffen nur Werbung'],a:1,e:'Der zentrale Schritt: Von \'Plattformen verbreiten Inhalte\' zu \'Plattformen produzieren soziale Normen\'. Design entscheidet mit, was als normal, attraktiv oder glaubwürdig gilt.',h:1},
{id:191,c:'auth',t:'true_false',q:'Soziale Sortierung meint im Kurs nicht nur Ranking von Inhalten, sondern auch Sortierung sozialer Chancen und Wahrnehmungen.',o:['Stimmt','Stimmt nicht'],a:0,e:'Plattformsortierung entscheidet über Sichtbarkeit von Menschen und Lebensentwürfen — damit auch darüber, welche sozialen Chancen als erreichbar gelten.',h:1},
{id:192,c:'auth',t:'multiple_choice',q:'Welche kleine Designänderung passt am besten zur Logik „Architektur statt Appell“?',o:['Moralpredigt ohne jede Interface-Änderung','sichtbare Friktion oder Kontextsignal vor potenziell schädlicher Handlung','vollständiger Verzicht auf Regeln','neue Hintergrundfarbe'],a:1,e:'Architekturinterventionen ändern die Bedingungen von Entscheidungen — Friktion, Kontextsignale — statt auf moralische Überzeugung zu setzen. Das ist strukturell wirksamer.',h:1},
{id:193,c:'auth',t:'true_false',q:'Eine Plattform kann Menschen das Gefühl eigener Wahl lassen, obwohl sie relevante Optionen vorsortiert.',o:['Stimmt','Stimmt nicht'],a:0,e:'Vorsortierung schränkt den faktischen Entscheidungsraum ein, ohne dass Nutzer:innen das wahrnehmen — eine subtile Form von Autonomiebeschränkung durch Design.',h:1},
{id:194,c:'auth',t:'multiple_choice',q:'Welche Aussage ist am treffendsten?',o:['Vorsortierung und persönliche Wahl schließen sich völlig aus','Vorsortierung kann Entscheidungsspielräume rahmen, ohne sie vollständig zu eliminieren','Wahlfreiheit ist immer Illusion','Architektur hat keinen Einfluss auf Entscheidungen'],a:1,e:'Wahlfreiheit und Architektureinfluss schließen sich nicht aus. Vorsortierung verändert aber, was als naheliegende Option erscheint, mit realen Effekten auf Entscheidungen.',h:1},
{id:195,c:'auth',t:'true_false',q:'Der Kurs legt nahe, dass Begehren, Nähe und Zugehörigkeit heute teilweise ökonomisch gestaltet und ausgewertet werden.',o:['Stimmt','Stimmt nicht'],a:0,e:'Intimacy as Feature: Plattformen haben Nähe als Produktdimension erschlossen. Was sich wie private Verbindung anfühlt, wird kommerziell ausgewertet.',h:1},
{id:196,c:'auth',t:'multiple_choice',q:'Welche Frage trifft die analytische Zuspitzung von Session 6 am besten?',o:['Welche Plattform ist am beliebtesten?','Welche soziale Ordnung wird durch Plattformdesign normalisiert?','Welche Plattform lädt am schnellsten?','Welche Zielgruppe reagiert am stärksten auf Werbung?'],a:1,e:'Digitale Ethik betrifft Technik, Organisation, Märkte und soziale Lebenswelten — der Übergang von individueller Moral zu systemischer Gestaltung ist ihr Kernthema.',h:1},
{id:197,c:'auth',t:'true_false',q:'Ein zentrales Thema des Moduls ist der Übergang von individueller Moral zu systemischer Gestaltung.',o:['Stimmt','Stimmt nicht'],a:0,e:'Das Modul entwickelt Ethik als Querschnittsdimension: technische Entscheidungen, organisationale Strukturen, Marktlogiken und soziale Erfahrungen sind alle normativ durchdrungen.',h:1},

const LS='wude_trainer';
let mode='learn', selCats=new Set(), queue=[], idx=0, score=0;
let timer=null, timerLeft=60, answered=false, selIdx=-1;
let sessionAns=[];

function loadHS(){try{return JSON.parse(localStorage.getItem(LS)||'{}')}catch(e){return {}}}
function saveHS(d){try{localStorage.setItem(LS,JSON.stringify(d))}catch(e){}}

function buildTopics(){
  const g=document.getElementById('topicGrid');
  Object.entries(CATS).forEach(([k,v])=>{
    const b=document.createElement('button');
    b.className='tc';b.dataset.cat=k;
    b.style.color=v.c;b.style.borderColor=v.c+'70';
    b.textContent=v.l;
    b.onclick=()=>{
      if(selCats.has(k)){selCats.delete(k);b.classList.remove('sel');b.style.background='';b.style.color=v.c;}
      else{selCats.add(k);b.classList.add('sel');b.style.background=v.c;b.style.color='#fff';b.style.borderColor=v.c;}
    };
    g.appendChild(b);
  });
}

function setMode(m){
  mode=m;
  document.getElementById('btnLearn').classList.toggle('sel',m==='learn');
  document.getElementById('btnExam').classList.toggle('sel',m==='exam');
  document.getElementById('btnSim').classList.toggle('sel',m==='sim');
}

function startQuiz(){
  let pool;
  if(mode==='sim'){
    // Klausur-Sim: 60 normal (h:0) + 40 hard (h:1), shuffled
    const easy=Q.filter(q=>!q.h||q.h===0).sort(()=>Math.random()-.5).slice(0,60);
    const hard=Q.filter(q=>q.h).sort(()=>Math.random()-.5).slice(0,40);
    pool=[...easy,...hard].sort(()=>Math.random()-.5);
  } else {
    pool=[...Q];
    if(selCats.size>0)pool=pool.filter(q=>selCats.has(q.c));
    const hs=loadHS();
    if(document.getElementById('chkWrong').checked&&(hs.wrong||[]).length>0)
      pool=pool.filter(q=>(hs.wrong||[]).includes(q.id));
    if(!pool.length){alert('Keine Fragen in dieser Auswahl.');return;}
    if(document.getElementById('chkRandom').checked)pool=pool.sort(()=>Math.random()-.5);
  }
  queue=pool;idx=0;score=0;sessionAns=[];selIdx=-1;streak=0;maxStreak=0;totalXP=0;
  if(mode==='sim'){startSimTimer();}
  show('scrQuiz');renderQ();
}

function renderQ(){
  if(idx>=queue.length){endQuiz();return;}
  answered=false;selIdx=-1;
  const q=queue[idx];const cat=CATS[q.c];
  document.getElementById('progFill').style.width=((idx/queue.length)*100)+'%';
  document.getElementById('progLbl').textContent=`${idx+1} / ${queue.length}`;
  document.getElementById('scoreLbl').textContent=`✓ ${score}`;
  const cb=document.getElementById('catBadge');
  cb.textContent=cat.l;cb.style.background=cat.c+'18';cb.style.color=cat.c;cb.style.border=`1px solid ${cat.c}40`;
  document.getElementById('qType').textContent=(q.t==='tf'||q.t==='true_false')?'Richtig / Falsch':'Multiple Choice — eine richtige Antwort';
  document.getElementById('qText').textContent=q.q;
  const ow=document.getElementById('optsWrap');ow.innerHTML='';
  q.o.forEach((o,i)=>{
    const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>selectOpt(i);ow.appendChild(b);
  });
  const fb=document.getElementById('feedback');fb.className='feedback';fb.innerHTML='';
  document.getElementById('btnCheck').style.display='inline-block';
  document.getElementById('btnCheck').disabled=true;
  document.getElementById('feedback').innerHTML='';
  document.getElementById('btnCheck').textContent=mode==='sim'?'Antwort abgeben':'Antwort prüfen';
  document.getElementById('btnNext').style.display='none';
  clearInterval(timer);
  if(mode==='sim'){
    document.getElementById('timerFill').style.width='0%';
  } else {
    timerLeft=60;updateTimer();
    timer=setInterval(()=>{timerLeft--;updateTimer();if(timerLeft<=0){clearInterval(timer);resolve(null);}},1000);
  }
}

function selectOpt(i){
  if(answered)return;
  selIdx=i;
  document.querySelectorAll('.opt').forEach((b,j)=>b.classList.toggle('selected',j===i));
  document.getElementById('btnCheck').disabled=false;
}

function checkAnswer(){if(!answered&&selIdx>=0)resolve(selIdx);}

function resolve(sel){
  clearInterval(timer);answered=true;
  const q=queue[idx];const ok=sel===q.a&&sel!==null;
  const timedOut=sel===null;
  const opts=document.querySelectorAll('.opt');
  opts.forEach((b,j)=>{
    b.classList.add('locked');
    if(j===q.a){b.classList.add('correct-reveal');if(ok)b.classList.add('bounce');}
    if(j===sel&&!ok){b.classList.add('wrong-reveal');b.classList.add('shake');}
  });
  if(ok){score++;streak++;maxStreak=Math.max(maxStreak,streak);}
  else{streak=0;}
  updateStreakBadge();

  // XP calculation
  let xpGain=0;
  if(ok){
    xpGain=10+(q.h?5:0)+(streak>=5?10:streak>=3?5:0);
  } else if(!timedOut){
    xpGain=0;
  }
  totalXP+=xpGain;
  if(xpGain>0)xpPop(xpGain,opts[q.a]);

  document.getElementById('scoreLbl').textContent=`✓ ${score} · ${totalXP} XP`;
  sessionAns.push({id:q.id,cat:q.c,correct:ok});

  if(mode==='learn'||mode==='sim'){
    const fb=document.getElementById('feedback');
    fb.className=''; fb.style.cssText='';  // reset old styles
    let html='';
    if(ok){
      const msgs=['Genau richtig.','Korrekt!','Sehr gut.','Stimmt.','Richtig!'];
      const msg=msgs[Math.floor(Math.random()*msgs.length)];
      html=`<div class="fb-wrap on" style="background:#f0fdf4;border:1.5px solid #bbf7d0">
        <div class="fb-verdict" style="color:#16a34a"><span style="font-size:1.1rem">✓</span> ${msg}${streak>=3?' <span style="color:#d97706">🔥 '+streak+' in Folge</span>':''}</div>
        <div class="fb-exp" style="color:#166534">${q.e}</div></div>`;
    } else {
      const selectedText=timedOut?'(keine Antwort)':q.o[sel];
      html=`<div class="fb-wrap on" style="background:#fdf2f2;border:1.5px solid #fecaca">
        <div class="fb-verdict" style="color:#c0392b"><span style="font-size:1.1rem">${timedOut?'⏱':'✗'}</span> ${timedOut?'Zeit abgelaufen.':'Nicht ganz.'}</div>
        ${!timedOut?`<div class="fb-row" style="background:#fee2e2;color:#991b1b"><div class="lbl">Deine Antwort</div>${selectedText}</div>`:''}
        <div class="fb-row" style="background:#f0fdf4;color:#166534"><div class="lbl">Richtige Antwort</div>${q.o[q.a]}</div>
        <div class="fb-exp" style="color:#7f1d1d">${q.e}</div></div>`;
    }
    fb.innerHTML=html;
  }
  document.getElementById('btnCheck').style.display='none';
  document.getElementById('btnNext').style.display='inline-block';
}

function nextQ(){idx++;renderQ();}

function updateTimer(){
  const f=document.getElementById('timerFill');
  f.style.width=(timerLeft/60*100)+'%';
  f.style.background=timerLeft>20?'#16a34a':timerLeft>10?'#d97706':'#c0392b';
}

function endQuiz(){
  clearInterval(timer);clearInterval(simInterval);
  document.getElementById('simTimerDisp').style.display='none';
  const total=sessionAns.length;
  const pct=total>0?Math.round(score/total*100):0;
  const hs=loadHS();
  const prevWrong=new Set(hs.wrong||[]);
  sessionAns.forEach(a=>{if(!a.correct)prevWrong.add(a.id);else prevWrong.delete(a.id);});
  hs.wrong=[...prevWrong];hs.best=Math.max(hs.best||0,pct);hs.total=(hs.total||0)+1;
  saveHS(hs);
  document.getElementById('resBig').textContent=`${score} / ${total}`;
  document.getElementById('resBig').style.color=pct>=75?'#16a34a':pct>=50?'#d97706':'#c0392b';
  const timeUsed=mode==='sim'?120*60-simSecsLeft:0;
  const tStr=mode==='sim'?` · Zeit: ${Math.floor(timeUsed/60)}:${String(timeUsed%60).padStart(2,'0')} min`:'';
  const grade=pct>=90?'Ausgezeichnet':pct>=75?'Sehr gut':pct>=60?'Gut':pct>=50?'Solide Basis':'Mehr Wiederholung empfohlen';
  document.getElementById('resSub').textContent=`${pct}% richtig — ${grade}${tStr}`;
  // XP + streak stats
  const xpEl=document.getElementById('resXP');
  if(xpEl){xpEl.innerHTML=`<div class="xp-total">⚡ ${totalXP} XP verdient</div><div class="streak-stat">Längste Serie: ${'🔥'.repeat(Math.min(maxStreak,5))} ${maxStreak} in Folge${pct>=75&&mode!=='sim'?' · '+grade:''}${tStr?'<br>'+tStr:''}</div>`;}
  const bars=document.getElementById('topicBars');bars.innerHTML='';
  Object.entries(CATS).forEach(([k,v])=>{
    const qs=sessionAns.filter(a=>a.cat===k);if(!qs.length)return;
    const ok=qs.filter(a=>a.correct).length;const p=Math.round(ok/qs.length*100);
    bars.innerHTML+=`<div class="tb-row"><span class="tb-lbl">${v.l}</span><div class="tb-bar-wrap"><div class="tb-bar" style="width:${p}%;background:${v.c}"></div></div><span class="tb-score">${ok}/${qs.length}</span></div>`;
  });
  if(mode==='exam'){
    const wq=sessionAns.filter(a=>!a.correct).map(a=>Q.find(q=>q.id===a.id)).filter(Boolean);
    if(wq.length){
      document.getElementById('wrongSection').style.display='block';
      document.getElementById('wrongList').innerHTML=wq.map(q=>`<div class="wq-item"><strong>${q.q}</strong><span>Richtig: ${q.o[q.a]}</span><br><span style="font-size:.76rem">${q.e}</span></div>`).join('');
    }
  }
  if(prevWrong.size>0)document.getElementById('btnRetryWrong').style.display='inline-block';
  show('scrResults');
}

function retryWrong(){
  document.getElementById('chkWrong').checked=true;
  selCats.clear();
  document.querySelectorAll('.tc').forEach(b=>{b.classList.remove('sel');b.style.background='';b.style.color=CATS[b.dataset.cat].c;});
  show('scrHome');startQuiz();
}

let simInterval=null,simSecsLeft=0;
let streak=0,maxStreak=0,totalXP=0;

function xpPop(pts, el){
  const r=el?el.getBoundingClientRect():{top:window.innerHeight/2,left:window.innerWidth/2};
  const d=document.createElement('div');
  d.className='xp-pop'+(pts<0?' neg':'');
  d.textContent=(pts>0?'+':'')+pts+' XP';
  d.style.cssText=`top:${r.top-30}px;left:${r.left+r.width/2-24}px`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),950);
}

function updateStreakBadge(){
  const b=document.getElementById('streakBadge');
  if(streak>=2){
    b.className='streak-badge on'+(streak>=7?' mega':'');
    const fire=streak>=10?'🔥🔥':'🔥';
    b.textContent='';
    b.innerHTML=fire+' '+streak;
  } else {
    b.className='streak-badge';
  }
}
function startSimTimer(){
  clearInterval(simInterval);
  simSecsLeft=120*60; // 120 minutes
  const disp=document.getElementById('simTimerDisp');
  disp.style.display='block';
  updateSimTimer();
  simInterval=setInterval(()=>{
    simSecsLeft--;updateSimTimer();
    if(simSecsLeft<=0){clearInterval(simInterval);endQuiz();}
  },1000);
}
function updateSimTimer(){
  const d=document.getElementById('simTimerDisp');if(!d)return;
  const h=Math.floor(simSecsLeft/3600);
  const m=Math.floor((simSecsLeft%3600)/60);
  const s=simSecsLeft%60;
  d.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  d.style.color=simSecsLeft<600?'#c0392b':simSecsLeft<1800?'#d97706':'var(--txt)';
}
function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

buildTopics();
const _hs=loadHS();
if(_hs.best)document.getElementById('homeHS').textContent=`Bestes Ergebnis: ${_hs.best}% · Sitzungen: ${_hs.total||0}`;
</script></body></html>
